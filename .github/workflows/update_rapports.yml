name: Update rapports.json (AN)

on:
  schedule:
    # Tous les jours à 04:17 UTC (GitHub schedule utilise UTC)
    - cron: "17 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Update rapports.json from AN publication_j
        run: |
          python scripts/update_an_publications.py

      - name: Commit & push if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rapports.json
          git commit -m "chore: update rapports.json (AN)"
          git push
